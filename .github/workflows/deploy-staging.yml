name: EFVM360 Deploy Staging

on:
  push:
    branches: [staging]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.30.1"
  AZURE_RG: rg-efvm360-staging
  BACKEND_APP: efvm360-api-staging
  FRONTEND_APP: efvm360-frontend-staging

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-backend:
    name: Deploy backend to Azure App Service
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://${{ env.BACKEND_APP }}.azurewebsites.net
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @efvm360/backend build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - name: Deploy backend package
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP }}
          package: backend

  deploy-frontend:
    name: Deploy frontend to Azure Static Web Apps
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://${{ env.FRONTEND_APP }}.azurestaticapps.net
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @efvm360/frontend build

      - name: Deploy frontend artifacts
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN_STAGING }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true
