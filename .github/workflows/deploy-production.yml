name: EFVM360 Deploy Production

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.30.1"
  AZURE_RG: rg-efvm360-prod
  BACKEND_APP: efvm360-api-production
  FRONTEND_APP: efvm360-frontend-production

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy production artifacts
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.BACKEND_APP }}.azurewebsites.net
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PRODUCTION }}

      - name: Deploy backend to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP }}
          slot-name: staging
          package: backend

      - name: Swap staging slot into production
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp deployment slot swap \
              -g ${{ env.AZURE_RG }} \
              -n ${{ env.BACKEND_APP }} \
              --slot staging \
              --target-slot production

      - name: Deploy frontend static assets
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN_PRODUCTION }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true
