# ============================================================================
# VFZ v3.2 — Dependabot Configuration
# Automated dependency updates for security patches
# ============================================================================

version: 2

updates:
  # Frontend dependencies
  - package-ecosystem: npm
    directory: /vfz
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    reviewers:
      - "vfz-team/frontend"
    commit-message:
      prefix: "chore(deps-frontend):"

  # Backend dependencies
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    reviewers:
      - "vfz-team/backend"
    commit-message:
      prefix: "chore(deps-backend):"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - "dependencies"
      - "ci-cd"
    commit-message:
      prefix: "chore(deps-actions):"
