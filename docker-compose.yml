# ============================================================================
# EFVM360 — Docker Compose para Desenvolvimento Local
# Uso: docker-compose up -d
# ============================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: efvm360-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-efvm360_railway}
      MYSQL_USER: ${MYSQL_USER:-efvm360_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme_app}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --log-bin-trust-function-creators=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-changeme_root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: builder
    container_name: efvm360-backend
    restart: unless-stopped
    command: ["pnpm", "dev"]
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: efvm360_railway
      DB_USER: efvm360_app
      DB_PASSWORD: ${MYSQL_PASSWORD:-changeme_app}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_min_64_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_jwt_refresh_min_64_chars}
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: efvm360-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001/api/v1
      VITE_ENV: development
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local
